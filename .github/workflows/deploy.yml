name: Build & Deploy to Cloudron

# CI builds the app image and pushes it to the private registry at
# registry.slint.dev, then points the Cloudron app at the pushed image with
# `cloudron update --image`. `cloudron update` reads CloudronManifest.json from
# this checkout; the Cloudron box pulls the runtime image from the registry.
#
# IMPORTANT — classic `docker push`, NOT buildx:
#   registry.slint.dev runs Joxit docker-registry-ui + registry:2 behind nginx.
#   A BuildKit/`buildx --push` push reports success but does NOT persist (the
#   manifest/blobs are silently dropped by the proxy), whereas a classic
#   `docker push` works. This was verified directly: a tiny image pushed with
#   `docker push` appears in /v2/_catalog, the same image pushed with
#   `buildx --push` does not. So we build into the daemon and `docker push`.
#
# Required repository secrets: CLOUDRON_TOKEN, REGISTRY_USERNAME, REGISTRY_PASSWORD
# Required repository variables: GH_APP_ID, GH_ORGANIZATION
# One-time box setup so Cloudron can PULL the private image:
#   my.slint.dev → Settings → Private Docker Registry → registry.slint.dev + creds

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: registry.slint.dev/zeiterfassung
  CLOUDRON_SERVER: my.slint.dev
  CLOUDRON_APP: zeit.slint.dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry.slint.dev
        uses: docker/login-action@v3
        with:
          registry: registry.slint.dev
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Build into the local Docker daemon (runner is amd64 → image is amd64),
      # then push with classic `docker push`. Do NOT switch to `buildx --push`
      # (see header note: it doesn't persist to this registry).
      - name: Build image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      # Guard: confirm the tag is actually retrievable from the registry before
      # deploying, so a push that didn't persist fails loudly here instead of
      # silently at `cloudron update`.
      - name: Verify image is in the registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "Checking registry for tag ${{ github.sha }} ..."
          curl -fsS -u "$REGISTRY_USERNAME:$REGISTRY_PASSWORD" \
            "https://registry.slint.dev/v2/zeiterfassung/tags/list" | tee /tmp/tags.json
          echo
          grep -q "${{ github.sha }}" /tmp/tags.json \
            || { echo "::error::Pushed tag ${{ github.sha }} not found in registry — push did not persist"; exit 1; }

      - name: Install Cloudron CLI
        run: npm install -g cloudron

      # --server/--token are GLOBAL flags and must come before the subcommand.
      - name: Update app from the pushed image
        run: |
          cloudron \
            --server "$CLOUDRON_SERVER" \
            --token "${{ secrets.CLOUDRON_TOKEN }}" \
            update \
            --app "$CLOUDRON_APP" \
            --image "$IMAGE:${{ github.sha }}"

      - name: Set GitHub App env vars
        run: |
          cloudron \
            --server "$CLOUDRON_SERVER" \
            --token "${{ secrets.CLOUDRON_TOKEN }}" \
            env set \
            --app "$CLOUDRON_APP"
