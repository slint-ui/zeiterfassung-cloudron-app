name: Deploy to Cloudron

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cloudron CLI
        run: npm install -g cloudron

      - name: Write GitHub App private key
        run: |
          printf '%s' "${{ secrets.GH_APP_PRIVATE_KEY }}" > cloudron/github-app-private-key.pem

      - name: Deploy
        run: |
          cloudron \
            --server my.slint.dev \
            --token "${{ secrets.CLOUDRON_TOKEN }}" \
            update \
            --app zeit.slint.dev

      - name: Login to Cloudron
        run: cloudron login --server my.slint.dev --token "${{ secrets.CLOUDRON_TOKEN }}"

      - name: Set GitHub App env vars
        run: |
          cloudron env set --app zeit.slint.dev \
            GITHUB_APP_ID="${{ vars.GH_APP_ID }}" \
            GITHUB_ORGANIZATION="${{ vars.GH_ORGANIZATION }}"
