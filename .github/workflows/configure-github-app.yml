name: Configure GitHub App Integration

# Run manually from Actions tab — only needed once on initial setup,
# or again when the private key is rotated.
#
# Required repository configuration (Settings → Secrets and variables → Actions):
#   Variables:  GH_APP_ID       — numeric App ID from the GitHub App settings page
#               GH_ORGANIZATION — org login, e.g. "slint-ui"
#   Secrets:    GH_APP_PRIVATE_KEY — base64-encoded .pem file
#                                    (run: base64 -i private-key.pem | tr -d '\n')
#               CLOUDRON_TOKEN     — already set for deploy.yml
on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudron CLI
        run: npm install -g cloudron

      - name: Set GitHub App env vars (single restart)
        run: |
          cloudron env set \
            --server my.slint.dev \
            --token "${{ secrets.CLOUDRON_TOKEN }}" \
            --app zeit.slint.dev \
            GITHUB_APP_ID="${{ vars.GH_APP_ID }}" \
            GITHUB_APP_PRIVATE_KEY="${{ secrets.GH_APP_PRIVATE_KEY }}" \
            GITHUB_ORGANIZATION="${{ vars.GH_ORGANIZATION }}"
