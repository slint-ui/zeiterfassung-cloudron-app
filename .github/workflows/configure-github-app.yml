name: Configure GitHub App Integration

# Run manually from Actions tab — only needed once on initial setup.
# The private key is baked into the image automatically on every deploy via
# the GH_APP_PRIVATE_KEY repository secret.
#
# This workflow only sets the two non-sensitive Cloudron env vars that
# Spring Boot needs alongside the key:
#
#   Repository variables (Settings → Secrets and variables → Actions → Variables):
#     GH_APP_ID       — numeric App ID from the GitHub App settings page
#     GH_ORGANIZATION — org login, e.g. "slint-ui"
#
#   Repository secrets:
#     CLOUDRON_TOKEN  — already set for deploy.yml
on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudron CLI
        run: npm install -g cloudron

      - name: Login to Cloudron
        run: cloudron login --server my.slint.dev --token "${{ secrets.CLOUDRON_TOKEN }}"

      - name: Set GitHub App env vars
        run: |
          cloudron env set --app zeit.slint.dev \
            GITHUB_APP_ID="${{ vars.GH_APP_ID }}" \
            GITHUB_ORGANIZATION="${{ vars.GH_ORGANIZATION }}"
